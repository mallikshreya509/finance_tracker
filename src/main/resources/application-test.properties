# Test profile - uses same MySQL but a separate test DB
spring.datasource.url=jdbc:mysql://localhost:3306/finance_tracker_test?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=create-drop

# Dummy JWT for tests
jwt.secret=TestSecretKeyForJWTTokenGenerationThatMustBeAtLeast256BitsLong1234
jwt.expiration.ms=3600000
jwt.refresh.expiration.ms=86400000

# Dummy Gemini key for tests
gemini.api.key=test-key
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
